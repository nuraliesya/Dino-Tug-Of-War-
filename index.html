<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Tug of War - Edisi Emoji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; margin: 0; overflow: hidden; background: #1a202c; }
        .font-game { font-family: 'Fredoka One', cursive; }
        .rope-gradient {
            background: linear-gradient(90deg, #8b4513 0%, #d2b48c 50%, #8b4513 100%);
            height: 14px; border-radius: 7px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .knot {
            width: 35px; height: 35px; background: #ff0000; border-radius: 50%; border: 4px solid #fff;
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }
        .correct-flash { animation: flashGreen 0.5s ease; }
        @keyframes flashGreen {
            0% { background-color: transparent; }
            50% { background-color: rgba(34, 197, 94, 0.4); }
            100% { background-color: transparent; }
        }
        #yt-players { position: absolute; top: -9999px; left: -9999px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="yt-players">
        <div id="player-correct"></div>
        <div id="player-winner"></div>
        <div id="player-bgm"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ASSETS = {
            bg: "https://i.imgur.com/hu8aBFB.png",
            dinoLeft: "https://i.imgur.com/wNVwFKJ.png",
            dinoRight: "https://i.imgur.com/UilWyZd.png",
            ytCorrectId: "PKdTziPZrhY",
            ytWinnerId: "teUWsONJkk8",
            ytBgmId: "UaRrDZWhtWA" 
        };

        // BANK SOALAN (Bahasa Melayu)
        // Menggunakan emoji khusus yang diminta
        const questionBank = [
            { question: "baju", type: "emoji", icon: "👕", options: ["baju", "topi", "seluar", "buku"], correct: "baju" },
            { question: "roti", type: "emoji", icon: "🍞", options: ["roti", "kek", "nasi", "susu"], correct: "roti" },
            { question: "bola", type: "emoji", icon: "⚽", options: ["bola", "raga", "pasu", "meja"], correct: "bola" },
            { question: "buku", type: "emoji", icon: "📖", options: ["buku", "pena", "bola", "roda"], correct: "buku" },
            { question: "pasu", type: "emoji", icon: "🪴", options: ["pasu", "bunga", "teko", "raga"], correct: "pasu" },
            { question: "roda", type: "emoji", icon: "🛞", options: ["roda", "moto", "bata", "kaca"], correct: "roda" },
            { question: "teko", type: "emoji", icon: "🫖", options: ["teko", "cawan", "lada", "sofa"], correct: "teko" },
            { question: "bata", type: "emoji", icon: "🧱", options: ["bata", "pasir", "meja", "buku"], correct: "bata" },
            { question: "kaca", type: "emoji", icon: "🥃", options: ["kaca", "besi", "lada", "bata"], correct: "kaca" },
            { question: "lada", type: "emoji", icon: "🌶️", options: ["lada", "garam", "sofa", "pasu"], correct: "lada" },
            { question: "sofa", type: "emoji", icon: "🛋️", options: ["sofa", "katil", "raga", "teko"], correct: "sofa" },
            { question: "raga", type: "emoji", icon: "🧺", options: ["raga", "bakul", "roda", "kaca"], correct: "raga" }
        ];

        function App() {
            const [gameState, setGameState] = useState('TITLE'); 
            const [position, setPosition] = useState(50); 
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [shuffledOptions, setShuffledOptions] = useState([]);
            const [winner, setWinner] = useState(null);
            const [freezeA, setFreezeA] = useState(0); 
            const [freezeB, setFreezeB] = useState(0); 
            const [feedback, setFeedback] = useState({ side: null, type: null });
            const [questionQueue, setQuestionQueue] = useState([]);

            const players = useRef({ correct: null, winner: null, bgm: null });

            useEffect(() => {
                window.onYouTubeIframeAPIReady = () => {
                    players.current.correct = new YT.Player('player-correct', { videoId: ASSETS.ytCorrectId });
                    players.current.winner = new YT.Player('player-winner', { videoId: ASSETS.ytWinnerId });
                    players.current.bgm = new YT.Player('player-bgm', { 
                        videoId: ASSETS.ytBgmId,
                        playerVars: { 'loop': 1, 'playlist': ASSETS.ytBgmId, 'controls': 0 },
                        events: { 'onReady': (e) => e.target.setVolume(40) }
                    });
                };
            }, []);

            useEffect(() => {
                if (gameState === 'PLAYING') {
                    if (players.current.bgm?.playVideo) players.current.bgm.playVideo();
                    shuffleAndNextQuestion(true);
                } else if (gameState === 'WINNER') {
                    if (players.current.bgm?.stopVideo) players.current.bgm.stopVideo();
                }
            }, [gameState]);

            const shuffleAndNextQuestion = (isStart = false) => {
                let currentQueue = isStart ? [] : [...questionQueue];
                
                // Jika queue habis, isi semula dan shuffle
                if (currentQueue.length === 0) {
                    currentQueue = [...questionBank].sort(() => Math.random() - 0.5);
                }

                const nextQ = currentQueue.pop();
                
                // Pastikan soalan tidak berulang berturutan
                if (!isStart && nextQ.question === currentQuestion.question && questionBank.length > 1) {
                    currentQueue.unshift(nextQ); // Letak balik dalam queue
                    return shuffleAndNextQuestion(); // Cuba lagi
                }

                setQuestionQueue(currentQueue);
                setCurrentQuestion(nextQ);
                setShuffledOptions([...nextQ.options].sort(() => Math.random() - 0.5));
            };

            const playSound = (type) => {
                const p = players.current[type];
                if (p && p.playVideo) {
                    p.seekTo(0);
                    p.playVideo();
                }
            };

            const handleAnswer = (side, answer) => {
                if ((side === 'A' && freezeA > 0) || (side === 'B' && freezeB > 0)) return;
                
                if (answer === currentQuestion.correct) {
                    setFeedback({ side, type: 'CORRECT' });
                    playSound('correct');
                    const move = side === 'A' ? -7 : 7;
                    const newPos = position + move;
                    setPosition(newPos);

                    if (newPos <= 10) endGame('KUMPULAN HIJAU');
                    else if (newPos >= 90) endGame('KUMPULAN UNGU');
                    else {
                        setTimeout(() => {
                            setFeedback({ side: null, type: null });
                            shuffleAndNextQuestion();
                        }, 500);
                    }
                } else {
                    setFeedback({ side, type: 'WRONG' });
                    const setter = side === 'A' ? setFreezeA : setFreezeB;
                    setter(5);
                    const timer = setInterval(() => {
                        setter(prev => {
                            if (prev <= 1) { clearInterval(timer); return 0; }
                            return prev - 1;
                        });
                    }, 1000);
                    setTimeout(() => setFeedback({ side: null, type: null }), 1000);
                }
            };

            const endGame = (team) => {
                setWinner(team);
                setGameState('WINNER');
                playSound('winner');
            };

            return (
                <div className="h-screen w-screen overflow-hidden flex flex-col bg-slate-900 text-white relative">
                    
                    {gameState === 'TITLE' && (
                        <div className="flex-1 flex flex-col items-center justify-center bg-gradient-to-br from-indigo-700 to-purple-900 p-6 text-center">
                            <h1 className="text-5xl md:text-7xl font-game mb-16 drop-shadow-2xl">DINO TUG OF WAR</h1>
                            <button 
                                onClick={() => setGameState('PLAYING')}
                                className="bg-purple-500 hover:bg-purple-400 font-game text-5xl py-8 px-20 rounded-2xl shadow-[0_10px_0_rgb(88,28,135)] active:translate-y-2 transition-all animate-bounce"
                            >
                                MASUK
                            </button>
                        </div>
                    )}

                    {gameState === 'PLAYING' && (
                        <>
                            <div className="h-[25%] flex flex-col items-center justify-center bg-white text-slate-800 border-b-8 border-slate-300 z-10">
                                <div className="flex items-center space-x-10">
                                    {/* Memaparkan emoji yang diminta dalam saiz besar */}
                                    <span className="text-9xl">{currentQuestion?.icon}</span>
                                    <span className="text-6xl font-game">ini <span className="text-emerald-600 underline decoration-4 underline-offset-8">______</span>.</span>
                                </div>
                            </div>

                            <div className="h-[50%] relative">
                                <img src={ASSETS.bg} className="absolute inset-0 w-full h-full object-cover opacity-90" alt="bg" />
                                <div className="absolute inset-0 flex items-center justify-center px-24">
                                    <div className="w-full relative">
                                        <div className="rope-gradient w-full"></div>
                                        <div className="knot shadow-lg" style={{ left: `${position}%` }}></div>
                                    </div>
                                </div>
                                <div className="absolute inset-0 flex items-center justify-between px-16 pointer-events-none">
                                    <div className="transition-all duration-500 flex flex-col items-center" style={{ transform: `translateX(${(position - 50) * 0.8}%)` }}>
                                        <img src={ASSETS.dinoLeft} className="w-48 md:w-64 drop-shadow-2xl" alt="hijau" />
                                        <div className="bg-green-600 text-center py-2 px-6 rounded-full font-game text-2xl border-2 border-white mt-2 shadow-lg">HIJAU</div>
                                    </div>
                                    <div className="transition-all duration-500 flex flex-col items-center" style={{ transform: `translateX(${(position - 50) * 0.8}%)` }}>
                                        <img src={ASSETS.dinoRight} className="w-48 md:w-64 drop-shadow-2xl" alt="ungu" />
                                        <div className="bg-purple-600 text-center py-2 px-6 rounded-full font-game text-2xl border-2 border-white mt-2 shadow-lg">UNGU</div>
                                    </div>
                                </div>
                            </div>

                            <div className="h-[25%] flex border-t-8 border-slate-800 bg-slate-800">
                                <div className={`flex-1 grid grid-cols-2 gap-3 p-4 relative ${feedback.side === 'A' && feedback.type === 'CORRECT' ? 'correct-flash' : ''}`}>
                                    {shuffledOptions.map((opt, i) => (
                                        <button key={`A-${i}`} disabled={freezeA > 0} onClick={() => handleAnswer('A', opt)} className={`rounded-xl font-game text-4xl shadow-[0_6px_0_rgba(0,0,0,0.4)] ${freezeA > 0 ? 'bg-slate-600 opacity-50' : 'bg-green-600 hover:bg-green-500 active:translate-y-1'}`}>{opt}</button>
                                    ))}
                                    {freezeA > 0 && <div className="absolute inset-0 flex items-center justify-center bg-black/80 font-game text-red-500 text-5xl rounded-xl z-30 font-bold">SALAH! {freezeA}s</div>}
                                </div>
                                <div className="w-3 bg-slate-900"></div>
                                <div className={`flex-1 grid grid-cols-2 gap-3 p-4 relative ${feedback.side === 'B' && feedback.type === 'CORRECT' ? 'correct-flash' : ''}`}>
                                    {shuffledOptions.map((opt, i) => (
                                        <button key={`B-${i}`} disabled={freezeB > 0} onClick={() => handleAnswer('B', opt)} className={`rounded-xl font-game text-4xl shadow-[0_6px_0_rgba(0,0,0,0.4)] ${freezeB > 0 ? 'bg-slate-600 opacity-50' : 'bg-purple-600 hover:bg-purple-500 active:translate-y-1'}`}>{opt}</button>
                                    ))}
                                    {freezeB > 0 && <div className="absolute inset-0 flex items-center justify-center bg-black/80 font-game text-red-500 text-5xl rounded-xl z-30 font-bold">SALAH! {freezeB}s</div>}
                                </div>
                            </div>
                        </>
                    )}

                    {gameState === 'WINNER' && (
                        <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black/95 p-6 backdrop-blur-md animate-in fade-in duration-500">
                            <div className="bg-white rounded-[3rem] p-12 max-w-2xl w-full text-center border-[15px] border-yellow-400 shadow-2xl animate-in zoom-in duration-300">
                                <h2 className="text-7xl font-game text-slate-800 mb-6 uppercase">Syabas!</h2>
                                <div className={`text-5xl font-game mb-10 py-6 px-12 rounded-3xl inline-block ${winner === 'KUMPULAN HIJAU' ? 'bg-green-600' : 'bg-purple-600'} text-white shadow-xl`}>{winner} MENANG!</div>
                                <br />
                                <button onClick={() => window.location.reload()} className="bg-yellow-500 hover:bg-yellow-400 font-game text-4xl py-6 px-16 rounded-full shadow-[0_10px_0_rgb(180,130,0)] active:translate-y-2 transition-all">MAIN SEMULA</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
